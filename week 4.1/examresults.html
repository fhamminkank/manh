<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Fundamentals Exam Result</title>

    <style>
        :root {
            --primary: #1f3a8a;
            --secondary: #f1f5f9;
            --border: #e5e7eb;
            --text-dark: #1f2933;
            --text-light: #6b7280;
            --success: #16a34a;
            --white: #ffffff;
        }

        body {
            font-family: "Times New Roman", serif;
            background-color: var(--secondary);
            margin: 0;
            padding: 40px;
            color: var(--text-dark);
        }

        .container {
            max-width: 760px;
            margin: auto;
            background: var(--white);
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin: 0 0 24px;
            color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        caption {
            caption-side: top;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-light);
        }

        thead th {
            position: sticky;
            top: 0;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            padding: 14px;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px 14px;
        }

        tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tbody tr:hover {
            background-color: #eef2ff;
        }

        td:nth-child(1),
        td:nth-child(4) {
            text-align: center;
            font-weight: 600;
        }

        td:nth-child(2),
        td:nth-child(3) {
            text-align: left;
        }

        .score {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background-color: #dcfce7;
            color: var(--success);
            font-weight: 700;
            font-size: 14px;
        }

        .average {
            text-align: right;
            font-size: 16px;
            font-weight: 600;
            color: #374151;
        }

        .average span {
            color: var(--primary);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 20px;
            }

            th, td {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Web Fundamentals Exam Result</h1>

    <table>
        <caption>Exam results of 05 participants</caption>

        <thead>
            <tr>
                <th>№</th>
                <th>First name</th>
                <th>Last name</th>
                <th>Score</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>01</td>
                <td>Gosho</td>
                <td>Goshev</td>
                <td><span class="score">500</span></td>
            </tr>
            <tr>
                <td>02</td>
                <td>Tosho</td>
                <td>Toshev</td>
                <td><span class="score">500</span></td>
            </tr>
            <tr>
                <td>03</td>
                <td>Gencho</td>
                <td>Genchev</td>
                <td><span class="score">500</span></td>
            </tr>
            <tr>
                <td>04</td>
                <td>Draga</td>
                <td>Draganova</td>
                <td><span class="score">500</span></td>
            </tr>
            <tr>
                <td>05</td>
                <td>Gosho</td>
                <td>Goshev</td>
                <td><span class="score">500</span></td>
            </tr>
        </tbody>
    </table>

    <p class="average">
        Average score from 05 participants:
        <span>500</span>
    </p>
</div>

</body>
</html>
